<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>家計ダッシュボード</title>
<script src="xlsx.full.min.js"></script>
<script src="jszip.min.js"></script>
<style>
  :root {
    --bg: #f4f6f9; --card: #ffffff; --text: #1a2233; --sub: #6b7688;
    --accent: #2563eb; --accent-light: #dbeafe; --green: #059669; --red: #dc2626;
    --border: #e3e8ef; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--sub); font-size: 12px; margin-bottom: 16px; }

  #drop {
    border: 2px dashed #b8c2d0; border-radius: var(--radius); background: var(--card);
    padding: 48px 24px; text-align: center; cursor: pointer; transition: .2s;
  }
  #drop.over { border-color: var(--accent); background: var(--accent-light); }
  #drop p { color: var(--sub); font-size: 14px; }
  #drop strong { color: var(--accent); }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 18px 0 14px; }
  .tab {
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--sub);
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab .badge { font-size: 10px; margin-left: 4px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 16px 18px; border: 1px solid var(--border); }
  .card .label { font-size: 11px; color: var(--sub); font-weight: 600; letter-spacing: .05em; }
  .card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .card .delta { font-size: 12px; margin-top: 2px; }
  .up { color: var(--red); } .down { color: var(--green); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 18px; }
  .panel h2 { font-size: 14px; margin-bottom: 12px; }

  .bank-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .bank-row:last-child { border-bottom: none; }
  .bank-row .amt { font-weight: 700; font-variant-numeric: tabular-nums; }

  .bar-row { display: grid; grid-template-columns: 110px 1fr 90px; gap: 8px; align-items: center; font-size: 12px; padding: 5px 0; }
  .bar-track { background: #eef1f6; border-radius: 6px; height: 16px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: var(--accent); min-width: 2px; }
  .bar-amt { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--sub); font-size: 11px; padding: 6px 8px; border-bottom: 2px solid var(--border); }
  td { padding: 9px 8px; border-bottom: 1px solid var(--border); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  tr.done td { color: #9aa4b5; }
  tr.done td.item { text-decoration: line-through; }
  .day-chip { display: inline-block; background: var(--accent-light); color: var(--accent); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }

  #trend svg { width: 100%; height: 180px; }
  .hidden { display: none; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .panel-head h2 { margin-bottom: 0; }
  .btn {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .amt-input {
    width: 110px; text-align: right; font-size: 13px; font-weight: 600;
    padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px;
    font-variant-numeric: tabular-nums; color: #1d4ed8;
  }
  .amt-input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  #savebar {
    display: flex; gap: 10px; align-items: center; margin-top: 12px;
    background: #fff7ed; border: 1px solid #fdba74; border-radius: 10px; padding: 10px 14px; font-size: 12px;
  }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #16324f; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 10;
  }
  #toast.show { opacity: 1; }
  #statusbar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    font-size: 11px; color: var(--sub); margin-bottom: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
  }
  #statusbar .warn { color: #b45309; font-weight: 600; }
  .link-btn { background: none; border: none; color: var(--accent); font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0; }
  .fund-inputs { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .fund-inputs label { font-size: 11px; color: var(--sub); font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
  .fund-inputs .amt-input { width: 140px; }
  .gauge-track { background: #eef1f6; border-radius: 8px; height: 26px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 8px 0 0 8px; transition: width .3s; min-width: 2px; }
  .gauge-legend { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-top: 6px; }
  .verdict { font-size: 15px; font-weight: 700; margin-top: 10px; }
  .verdict.ok { color: var(--green); }
  .verdict.ng { color: var(--red); }
  .reload { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; text-decoration: underline; }
  tfoot td { font-weight: 700; border-top: 2px solid var(--text); border-bottom: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>家計ダッシュボード</h1>
  <p class="sub">「家計管理_引き落とし管理.xlsx」を読み込んで月別の引き落とし状況を表示します（データはこの端末内でのみ処理されます）</p>

  <div id="drop">
    <p><strong>ここに Excel ファイルをドラッグ&ドロップ</strong><br>またはクリックして選択<br><br>対象: 家計管理_引き落とし管理.xlsx</p>
    <input type="file" id="file" accept=".xlsx" class="hidden">
  </div>

  <div id="app" class="hidden">
    <div id="statusbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="cards">
      <div class="card"><div class="label">当月支出合計</div><div class="value" id="kpi-total"></div><div class="delta" id="kpi-delta"></div></div>
      <div class="card"><div class="label">年間累計（当月まで）</div><div class="value" id="kpi-cum"></div></div>
      <div class="card"><div class="label">月平均（入力済み月）</div><div class="value" id="kpi-avg"></div></div>
    </div>

    <div class="panel" style="margin-bottom:16px">
      <h2>資金チェック（この月の引き落としに足りる？）</h2>
      <div class="fund-inputs">
        <label>給料（手取り）<input class="amt-input" type="text" inputmode="numeric" id="inc-salary" placeholder="0" onchange="onIncome('s', this)"></label>
        <label>プール資金<input class="amt-input" type="text" inputmode="numeric" id="inc-pool" placeholder="0" onchange="onIncome('p', this)"></label>
      </div>
      <div id="fund-viz"></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>銀行別 入金準備リスト</h2>
        <div id="banks"></div>
      </div>
      <div class="panel">
        <h2>カテゴリ別支出</h2>
        <div id="cats"></div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:16px">
      <div class="panel-head">
        <h2 id="items-title">当月の引き落とし予定（引落日順・チェックで消込）</h2>
        <button class="btn" id="edit-btn" onclick="toggleEdit()">✏️ 金額を入力</button>
      </div>
      <table>
        <thead><tr><th style="width:36px"></th><th style="width:70px">引落日</th><th>項目</th><th>引落先</th><th style="width:130px; text-align:right">金額</th></tr></thead>
        <tbody id="items"></tbody>
        <tfoot><tr><td colspan="4">合計</td><td class="num" id="items-total"></td></tr></tfoot>
      </table>
      <div id="savebar" class="hidden">
        <span id="save-msg" style="flex:1">未保存の変更があります</span>
        <button class="btn primary" id="save-btn" onclick="saveFile()">💾 保存</button>
      </div>
    </div>

    <div class="panel" id="trend">
      <h2>年間推移</h2>
    </div>
    <p style="margin-top:14px"><button class="reload" onclick="location.reload()">別のファイルを読み込む</button></p>
  </div>
</div>

<div id="toast"></div>
<script>
const MONTHS = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
let DATA = null, current = null;
let rawBuf = null, fileHandle = null, editMode = false, dirty = false;
let SHEET_NAME = null, MCOL_LETTER = {}, editedBySheet = {}, lastPersist = null;
let INCOME = null, INCOME_SHEET = null;
let FILE_NAME = '家計管理_引き落とし管理.xlsx';
const XLSX_MIME = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
// iPhone/iPad: 共有シート経由で「ファイルに保存」できるか
const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const CAN_SHARE_FILE = (() => {
  try { return IS_IOS && !!navigator.canShare && navigator.canShare({ files: [new File(['x'], 't.xlsx', { type: XLSX_MIME })] }); }
  catch(e){ return false; }
})();

// ===== ブラウザ内自動保存 (IndexedDB): 開き直してもデータと入力が残る =====
function idb(){
  return new Promise((res, rej) => {
    const q = indexedDB.open('kakei-dashboard', 1);
    q.onupgradeneeded = () => q.result.createObjectStore('kv');
    q.onsuccess = () => res(q.result);
    q.onerror = () => rej(q.error);
  });
}
async function kvSet(k, v){
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(v, k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function kvGet(k){
  const db = await idb();
  return new Promise((res, rej) => {
    const r = db.transaction('kv').objectStore('kv').get(k);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function persistState(){
  lastPersist = Date.now();
  try {
    await kvSet('wb', { buf: rawBuf, dirty, time: lastPersist, name: FILE_NAME });
    if(fileHandle) await kvSet('handle', fileHandle);
  } catch(e){ /* プライベートブラウズ等では保存不可 */ }
}

function fmt(n){ return '¥' + Math.round(n).toLocaleString('ja-JP'); }

// 起動時: 1) ブラウザ内の前回データを復元 → 2) なければ同フォルダのxlsxを自動読み込み(http時)
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const saved = await kvGet('wb');
    if(saved && saved.buf){
      try { fileHandle = (await kvGet('handle')) || null; } catch(e){}
      if(saved.name) FILE_NAME = saved.name;
      parse(new Uint8Array(saved.buf));
      dirty = !!saved.dirty;
      lastPersist = saved.time || null;
      render();
      return;
    }
  } catch(e){ /* IndexedDB不可なら通常フローへ */ }
  if(location.protocol === 'file:') return;
  for(const name of ['⭐️家計管理_引き落とし管理.xlsx', '家計管理_引き落とし管理.xlsx']){
    try {
      const r = await fetch(encodeURI(name));
      if(!r.ok) continue;
      FILE_NAME = name;
      parse(new Uint8Array(await r.arrayBuffer()));
      persistState(); render();
      return;
    } catch(e){}
  }
});

const drop = document.getElementById('drop'), fileInput = document.getElementById('file');
// ファイル選択: 対応ブラウザ(Chrome/Edge)ではハンドル取得 → 直接上書き保存が可能
async function pickFile(){
  if (window.showOpenFilePicker) {
    try {
      const [h] = await showOpenFilePicker({ types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }] });
      fileHandle = h;
      readFile(await h.getFile());
    } catch(e) { /* キャンセル */ }
  } else fileInput.click();
}
drop.onclick = pickFile;
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = async e => {
  e.preventDefault(); drop.classList.remove('over');
  const item = e.dataTransfer.items && e.dataTransfer.items[0];
  if (item && item.getAsFileSystemHandle) {
    try {
      const h = await item.getAsFileSystemHandle();
      if (h && h.kind === 'file') { fileHandle = h; readFile(await h.getFile()); return; }
    } catch(err) { /* fallback below */ }
  }
  readFile(e.dataTransfer.files[0]);
};
fileInput.onchange = e => readFile(e.target.files[0]);

function readFile(f){
  if(!f) return;
  if(f.name) FILE_NAME = f.name;
  const r = new FileReader();
  r.onload = e => {
    try {
      parse(new Uint8Array(e.target.result));
      dirty = false; editedBySheet = {};
      persistState();
      render();
    }
    catch(err){ alert('読み込みに失敗しました: ' + err.message); }
  };
  r.readAsArrayBuffer(f);
}

function parse(buf){
  rawBuf = buf.buffer ? buf.buffer.slice(buf.byteOffset, buf.byteOffset + buf.byteLength) : buf;
  const wb = XLSX.read(buf, {type:'array'});
  const name = wb.SheetNames.find(n => n.includes('引き落とし管理'));
  if(!name) throw new Error('「引き落とし管理」シートが見つかりません');
  SHEET_NAME = name;
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, defval:null});
  // ヘッダー行（"4月"を含む行）を探す
  const hi = rows.findIndex(r => r && r.includes('4月'));
  if(hi < 0) throw new Error('月ヘッダー行が見つかりません');
  const header = rows[hi];
  const mcol = {}; MONTHS.forEach(m => { mcol[m] = header.indexOf(m); MCOL_LETTER[m] = XLSX.utils.encode_col(mcol[m]); });
  const items = [];
  for(let i = hi+1; i < rows.length; i++){
    const r = rows[i];
    if(!r || r[0] === '月別合計' || (typeof r[0] === 'string' && r[0].includes('合計'))) break;
    if(!r[2]) continue;
    const amounts = {};
    MONTHS.forEach(m => { const v = r[mcol[m]]; amounts[m] = (typeof v === 'number') ? v : 0; });
    items.push({ cat: r[1] || 'その他', item: r[2], bank: String(r[3]||'－').split('（')[0], day: r[4], amounts, row: i+1 });
  }
  if(!items.length) throw new Error('明細行が見つかりません');
  DATA = items;

  // 収入管理シート（あれば給料・プール資金をExcelと同期）
  INCOME = null; INCOME_SHEET = null;
  const incName = wb.SheetNames.find(n => n.includes('収入管理'));
  if(incName){
    const irows = XLSX.utils.sheet_to_json(wb.Sheets[incName], {header:1, defval:null});
    const ihi = irows.findIndex(r => r && r.includes('4月'));
    if(ihi >= 0){
      const icols = {}; MONTHS.forEach(m => icols[m] = irows[ihi].indexOf(m));
      const findRow = kw => { const i = irows.findIndex(r => r && typeof r[0] === 'string' && r[0].includes(kw)); return i >= 0 ? i + 1 : null; };
      const rs = findRow('給料'), rp = findRow('プール');
      if(rs && rp){
        const amounts = {};
        MONTHS.forEach(m => {
          const g = r => { const v = irows[r-1] ? irows[r-1][icols[m]] : null; return typeof v === 'number' ? v : 0; };
          amounts[m] = { s: g(rs), p: g(rp) };
        });
        const colLetters = {}; MONTHS.forEach(m => colLetters[m] = XLSX.utils.encode_col(icols[m]));
        INCOME = { rows: { s: rs, p: rp }, cols: colLetters, amounts };
        INCOME_SHEET = incName;
      }
    }
  }
  // デフォルト月: 今日の月（年度: 4月始まり）
  const nowM = new Date().getMonth() + 1;
  current = nowM + '月';
  if(!MONTHS.includes(current)) current = '4月';
  drop.classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
}

function monthTotal(m){ return DATA.reduce((s,it) => s + it.amounts[m], 0); }

function render(){
  // tabs
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  MONTHS.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab' + (m === current ? ' active' : '');
    const t = monthTotal(m);
    b.innerHTML = m + (t > 0 ? '' : '<span class="badge">·</span>');
    b.onclick = () => { current = m; render(); };
    tabs.appendChild(b);
  });

  const idx = MONTHS.indexOf(current);
  const total = monthTotal(current);
  const prev = idx > 0 ? monthTotal(MONTHS[idx-1]) : null;
  document.getElementById('kpi-total').textContent = fmt(total);
  const d = document.getElementById('kpi-delta');
  if(prev !== null && prev > 0){
    const diff = total - prev;
    d.textContent = '前月比 ' + (diff >= 0 ? '+' : '') + fmt(diff).replace('¥-','-¥');
    d.className = 'delta ' + (diff >= 0 ? 'up' : 'down');
  } else d.textContent = '';
  let cum = 0; for(let i = 0; i <= idx; i++) cum += monthTotal(MONTHS[i]);
  document.getElementById('kpi-cum').textContent = fmt(cum);
  const filled = MONTHS.map(monthTotal).filter(t => t > 0);
  document.getElementById('kpi-avg').textContent = filled.length ? fmt(filled.reduce((a,b)=>a+b,0)/filled.length) : '－';

  // banks
  const banks = {};
  DATA.forEach(it => { const v = it.amounts[current]; if(v) banks[it.bank] = (banks[it.bank]||0) + v; });
  document.getElementById('banks').innerHTML = Object.entries(banks).sort((a,b)=>b[1]-a[1])
    .map(([b,v]) => `<div class="bank-row"><span>${b}</span><span class="amt">${fmt(v)}</span></div>`).join('')
    || '<p style="color:var(--sub);font-size:13px">この月のデータはまだありません</p>';

  // categories
  const cats = {};
  DATA.forEach(it => { const v = it.amounts[current]; if(v) cats[it.cat] = (cats[it.cat]||0) + v; });
  const maxCat = Math.max(1, ...Object.values(cats));
  document.getElementById('cats').innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1])
    .map(([c,v]) => `<div class="bar-row"><span>${c}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxCat*100}%"></div></div><span class="bar-amt">${fmt(v)}</span></div>`).join('')
    || '<p style="color:var(--sub);font-size:13px">この月のデータはまだありません</p>';

  // item list sorted by day
  const dayNum = d => { const m = String(d||'').match(/\d+/); return m ? +m[0] : 99; };
  const list = (editMode ? DATA.slice() : DATA.filter(it => it.amounts[current] > 0)).sort((a,b) => dayNum(a.day) - dayNum(b.day));
  const key = 'kakei-done-' + current;
  const done = JSON.parse(localStorage.getItem(key) || '[]');
  document.getElementById('items').innerHTML = list.map(it => {
    const chk = done.includes(it.item);
    const dayLabel = dayNum(it.day) < 99 ? `<span class="day-chip">${dayNum(it.day)}日</span>` : '<span style="color:var(--sub)">－</span>';
    const v = it.amounts[current];
    const amtCell = editMode
      ? `<input class="amt-input" type="text" inputmode="numeric" value="${v || ''}" placeholder="0" onchange="onAmt(${it.row}, this)">`
      : fmt(v);
    return `<tr class="${chk?'done':''}"><td><input type="checkbox" ${chk?'checked':''} onchange="toggle('${it.item.replace(/'/g,"\\'")}')"></td><td>${dayLabel}</td><td class="item">${it.item}</td><td style="color:var(--sub)">${it.bank}</td><td class="num">${amtCell}</td></tr>`;
  }).join('') || '<tr><td colspan="5" style="color:var(--sub)">この月のデータはまだありません</td></tr>';
  document.getElementById('items-total').textContent = fmt(total);

  // edit UI state
  document.getElementById('items-title').textContent = editMode
    ? `${current}の金額を入力（青の欄に入力 → 保存）`
    : '当月の引き落とし予定（引落日順・チェックで消込）';
  const eb = document.getElementById('edit-btn');
  eb.textContent = editMode ? '✔️ 入力を終える' : '✏️ 金額を入力';
  eb.className = 'btn' + (editMode ? ' on' : '');
  const bar = document.getElementById('savebar');
  bar.classList.toggle('hidden', !dirty);
  if(dirty){
    document.getElementById('save-msg').textContent = fileHandle
      ? '未保存の変更があります（元のExcelファイルに上書き保存します）'
      : (CAN_SHARE_FILE
        ? 'Excelファイル未反映の入力があります（保存 → 「ファイルに保存」で反映）'
        : '未保存の変更があります（このブラウザでは修正版xlsxをダウンロード保存します）');
    document.getElementById('save-btn').textContent = fileHandle ? '💾 上書き保存' : (CAN_SHARE_FILE ? '📤 保存' : '⬇️ ダウンロード保存');
  }

  // ステータスバー: 自動保存の状態と再読み込みボタン
  const ts = lastPersist ? new Date(lastPersist) : null;
  const tsStr = ts ? `${ts.getMonth()+1}/${ts.getDate()} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}` : '';
  document.getElementById('statusbar').innerHTML =
    `<span>💾 入力はこのブラウザに自動保存${tsStr ? '（最終: ' + tsStr + '）' : ''}</span>`
    + (dirty ? '<span class="warn">⚠️ Excelファイルには未反映</span>' : '')
    + `<button class="link-btn" onclick="pickFile()">Excelファイルを読み込み直す</button>`;

  // 資金チェック: 給料+プール資金 vs 当月引き落とし合計
  const inc = getIncome(current);
  document.getElementById('inc-salary').value = inc.s || '';
  document.getElementById('inc-pool').value = inc.p || '';
  const incTotal = (inc.s || 0) + (inc.p || 0);
  const viz = document.getElementById('fund-viz');
  if(incTotal === 0){
    viz.innerHTML = '<p style="color:var(--sub);font-size:12px">給料とプール資金を入力すると、この月の引き落とし合計に足りるかを判定します'
      + (INCOME ? '（Excelの「収入管理」シートに保存されます）' : '（月ごとにこの端末へ自動保存）') + '</p>';
  } else {
    const pct = total / incTotal;
    const diff = incTotal - total;
    const ok = diff >= 0;
    const width = Math.min(pct, 1) * 100;
    viz.innerHTML =
      `<div class="gauge-track"><div class="gauge-fill" style="width:${width}%;background:${ok ? (pct > 0.9 ? '#d97706' : 'var(--green)') : 'var(--red)'}"></div></div>`
      + `<div class="gauge-legend"><span>引き落とし ${fmt(total)}（用意資金の ${Math.round(pct*100)}%）</span><span>用意資金 ${fmt(incTotal)}</span></div>`
      + `<div class="verdict ${ok ? 'ok' : 'ng'}">${ok ? '✅ 足りています（残り ' + fmt(diff) + '）' : '⚠️ ' + fmt(-diff) + ' 不足しています'}</div>`;
  }

  renderTrend();
}

function toggleEdit(){ editMode = !editMode; render(); }

async function onAmt(row, input){
  const it = DATA.find(x => x.row === row);
  if(!it) return;
  const raw = input.value.replace(/[¥,，\s]/g, '');
  const v = raw === '' ? null : Number(raw);
  if(raw !== '' && !isFinite(v)){ input.value = it.amounts[current] || ''; return; }
  it.amounts[current] = v || 0;
  (editedBySheet[SHEET_NAME] = editedBySheet[SHEET_NAME] || {})[`${MCOL_LETTER[current]}${row}`] = v;
  dirty = true;
  await bakeAndPersist();
}

// 入力を即座にワークブックへ反映し、ブラウザ内に自動保存（閉じても消えない）
async function bakeAndPersist(){
  try {
    rawBuf = await buildPatchedXlsx();
    editedBySheet = {};
  } catch(e){ /* 反映失敗時は editedBySheet に残るので保存時に再適用される */ }
  persistState();
  render();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 入力はブラウザ内に自動保存されるため、閉じてもデータは失われない

// ホスティング環境ではService Workerでオフライン動作を有効化
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ===== xlsx 書き戻し（ZIPを直接パッチ: 書式・数式・グラフはそのまま保持） =====
async function buildPatchedXlsx(){
  const zip = await JSZip.loadAsync(rawBuf);
  const parser = new DOMParser(), ser = new XMLSerializer();

  // 編集のあった各シートのXMLパスを workbook.xml + rels から特定してパッチ
  const wbDoc = parser.parseFromString(await zip.file('xl/workbook.xml').async('string'), 'application/xml');
  const relsDoc = parser.parseFromString(await zip.file('xl/_rels/workbook.xml.rels').async('string'), 'application/xml');
  for(const [sheetName, cells] of Object.entries(editedBySheet)){
    if(!Object.keys(cells).length) continue;
    const sheetEl = [...wbDoc.getElementsByTagName('sheet')].find(s => s.getAttribute('name') === sheetName);
    if(!sheetEl) throw new Error('シート定義が見つかりません: ' + sheetName);
    const rid = sheetEl.getAttribute('r:id') || sheetEl.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'id');
    const rel = [...relsDoc.getElementsByTagName('Relationship')].find(r => r.getAttribute('Id') === rid);
    let target = rel.getAttribute('Target');
    const sheetPath = target.startsWith('/') ? target.slice(1) : 'xl/' + target;

    const doc = parser.parseFromString(await zip.file(sheetPath).async('string'), 'application/xml');
    const ns = doc.documentElement.namespaceURI;
    const sheetData = doc.getElementsByTagName('sheetData')[0];
    for(const [ref, val] of Object.entries(cells)){
      const rc = XLSX.utils.decode_cell(ref);
      let rowEl = [...sheetData.children].find(r => +r.getAttribute('r') === rc.r + 1);
      if(!rowEl){
        rowEl = doc.createElementNS(ns, 'row');
        rowEl.setAttribute('r', rc.r + 1);
        const next = [...sheetData.children].find(r => +r.getAttribute('r') > rc.r + 1);
        sheetData.insertBefore(rowEl, next || null);
      }
      let cEl = [...rowEl.children].find(c => c.getAttribute('r') === ref);
      if(!cEl){
        cEl = doc.createElementNS(ns, 'c');
        cEl.setAttribute('r', ref);
        const next = [...rowEl.children].find(c => XLSX.utils.decode_cell(c.getAttribute('r')).c > rc.c);
        rowEl.insertBefore(cEl, next || null);
      }
      cEl.removeAttribute('t');
      [...cEl.children].forEach(ch => { if(ch.localName === 'v' || ch.localName === 'f' || ch.localName === 'is') cEl.removeChild(ch); });
      if(val !== null){
        const vEl = doc.createElementNS(ns, 'v');
        vEl.textContent = String(val);
        cEl.appendChild(vEl);
      }
    }
    zip.file(sheetPath, ser.serializeToString(doc));
  }

  // Excelで開いたとき全数式を再計算させる（合計・他シートのキャッシュ値が古いままにならないように）
  let calcPr = wbDoc.getElementsByTagName('calcPr')[0];
  if(!calcPr){
    calcPr = wbDoc.createElementNS(wbDoc.documentElement.namespaceURI, 'calcPr');
    const sheets = wbDoc.getElementsByTagName('sheets')[0];
    sheets.parentNode.insertBefore(calcPr, sheets.nextSibling);
  }
  calcPr.setAttribute('fullCalcOnLoad', '1');
  zip.file('xl/workbook.xml', ser.serializeToString(wbDoc));

  return zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' });
}

async function saveFile(){
  try {
    const pending = Object.values(editedBySheet).some(c => Object.keys(c).length);
    const buf = pending ? await buildPatchedXlsx() : rawBuf;
    if(fileHandle){
      if((await fileHandle.requestPermission({ mode: 'readwrite' })) !== 'granted') throw new Error('書き込み許可が得られませんでした');
      const w = await fileHandle.createWritable();
      await w.write(buf); await w.close();
      toast('✅ Excelファイルに上書き保存しました');
    } else if(CAN_SHARE_FILE){
      // iPhone: 画面遷移せず共有シート →「ファイルに保存」で家計フォルダへ
      const file = new File([buf], FILE_NAME, { type: XLSX_MIME });
      try {
        await navigator.share({ files: [file] });
      } catch(e){
        if(e.name === 'AbortError'){ toast('保存をキャンセルしました'); return; }
        throw e;
      }
      toast('📤 「ファイルに保存」→ 家計フォルダを選べば完了です');
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([buf], { type: XLSX_MIME }));
      a.download = FILE_NAME;
      a.click();
      URL.revokeObjectURL(a.href);
      toast('⬇️ ダウンロードしました。元のファイルと置き換えてください');
    }
    rawBuf = buf; editedBySheet = {}; dirty = false;
    persistState();
    render();
  } catch(err){
    toast('❌ 保存に失敗しました: ' + err.message);
  }
}

function toggle(item){
  const key = 'kakei-done-' + current;
  let done = JSON.parse(localStorage.getItem(key) || '[]');
  done = done.includes(item) ? done.filter(x => x !== item) : [...done, item];
  localStorage.setItem(key, JSON.stringify(done));
  render();
}

// ===== 給料・プール資金 =====
// Excelに「収入管理」シートがあればそこへ書き込み（支出と同じ保存フロー）、なければブラウザ保存
function getIncome(m){
  if(INCOME) return INCOME.amounts[m];
  const all = JSON.parse(localStorage.getItem('kakei-income') || '{}');
  return all[m] || { s: 0, p: 0 };
}
async function onIncome(field, input){
  const raw = input.value.replace(/[¥,，\s]/g, '');
  const v = raw === '' ? null : Number(raw);
  if(raw !== '' && !isFinite(v)){ input.value = getIncome(current)[field] || ''; return; }
  if(INCOME){
    INCOME.amounts[current][field] = v || 0;
    (editedBySheet[INCOME_SHEET] = editedBySheet[INCOME_SHEET] || {})[INCOME.cols[current] + INCOME.rows[field]] = v;
    dirty = true;
    await bakeAndPersist();
  } else {
    const all = JSON.parse(localStorage.getItem('kakei-income') || '{}');
    all[current] = { ...getIncome(current), [field]: v || 0 };
    localStorage.setItem('kakei-income', JSON.stringify(all));
    render();
  }
}

function renderTrend(){
  const vals = MONTHS.map(monthTotal);
  const max = Math.max(1, ...vals);
  const W = 900, H = 180, pad = 30, bw = (W - pad*2) / 12 * 0.62;
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  vals.forEach((v,i) => {
    const x = pad + (W - pad*2) / 12 * i + ((W-pad*2)/12 - bw)/2;
    const h = v / max * (H - 55);
    const y = H - 30 - h;
    const active = MONTHS[i] === current;
    svg += `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h,1)}" rx="4" fill="${active ? '#2563eb' : '#c7d6f5'}"/>`;
    svg += `<text x="${x+bw/2}" y="${H-12}" text-anchor="middle" font-size="11" fill="#6b7688">${MONTHS[i]}</text>`;
    if(v > 0) svg += `<text x="${x+bw/2}" y="${y-5}" text-anchor="middle" font-size="9" fill="#6b7688">${Math.round(v/10000)}万</text>`;
  });
  svg += '</svg>';
  const panel = document.getElementById('trend');
  panel.querySelectorAll('svg').forEach(e => e.remove());
  panel.insertAdjacentHTML('beforeend', svg);
}
